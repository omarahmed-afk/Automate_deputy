name: Run Deputy Automation

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional date YYYY-MM-DD. Leave empty to use yesterday NY time."
        required: false
        default: ""

  push:
    branches:
      - main

  schedule:
    - cron: "0 6 * * *"

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google service account file
        run: |
          printf '%s' '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Run Python script
        env:
          DEPUTY_TOKEN: ${{ secrets.DEPUTY_TOKEN }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS_FILE: service_account.json
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          python automate_dpt.py
