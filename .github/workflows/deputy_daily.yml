name: Deputy Daily Automation

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional date YYYY-MM-DD. Leave empty to use yesterday NY time."
        required: false
        default: ""

  schedule:
    - cron: "0 10 * * *"

jobs:
  run-deputy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google service account file
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Run Deputy automation
        env:
          DEPUTY_TOKEN: ${{ secrets.DEPUTY_TOKEN }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS_FILE: service_account.json
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          python automate_dpt.py
