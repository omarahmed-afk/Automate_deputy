name: Run Automate DPT 2

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional date YYYY-MM-DD. Leave empty to use yesterday NY time."
        required: false
        default: ""

  schedule:
    - cron: "30 12 * * *"

jobs:
  run-automate-dpt-2:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show current files
        run: |
          pwd
          ls -la
          ls -la .github/workflows

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automate_dpt_2
        env:
          DEPUTY_TOKEN: ${{ secrets.DEPUTY_TOKEN }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: python automate_dpt_2.py